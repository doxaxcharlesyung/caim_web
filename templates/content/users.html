{% extends 'content/base.html' %}{% block content %}<div class="dashboard-head"><div><span class="kicker">ACCESS CONTROL</span><h1>Users</h1></div></div>{% if error %}<p class="studio-error">{{ error }}</p>{% endif %}<div class="user-grid"><form method="post" class="sacred-card admin-form"><h2>Add user</h2><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label>Username<input name="username" minlength="3" required></label><label>Password<input name="password" type="password" minlength="8" required></label><button class="btn btn-primary">Add</button></form><div class="sacred-card user-list"><h2>Existing users</h2>{% for user in users %}<div class="user-row"><strong>{{ user.username }}</strong><form method="post" action="{{ url_for('content_admin.user_update',user_id=user.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button class="btn btn-secondary" name="action" value="toggle">{{ 'Disable' if user.is_active else 'Enable' }}</button></form><form method="post" action="{{ url_for('content_admin.user_update',user_id=user.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input name="password" type="password" minlength="8" required><button class="btn btn-secondary" name="action" value="password">Reset password</button></form></div>{% endfor %}</div></div>{% endblock %}
