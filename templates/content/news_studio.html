{% extends 'content/base.html' %}{% block content %}<div class="dashboard-head"><div><span class="kicker">UPDATES</span><h1>News Studio</h1></div><a class="btn btn-secondary" href="{{ url_for('content_admin.news') }}">Back to News</a></div>{% if notice %}<p class="studio-notice">{{ notice }}</p>{% endif %}{% if error %}<p class="studio-error">{{ error }}</p>{% endif %}<form class="studio-form sacred-card" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input type="hidden" name="original_slug" value="{{ selected.slug if selected else '' }}"><div class="studio-form-head"><strong>{{ selected.title if selected else 'New News or Event' }}</strong><div class="studio-toolbar"><a class="btn btn-secondary" href="{{ url_for('content_admin.news_studio') }}">New</a><button class="btn btn-secondary" name="action" value="save">Save</button><button class="btn btn-primary" name="action" value="post">Post</button></div></div><div class="studio-fields"><label class="field">Type<select name="content_type"><option value="news">News</option><option value="event" {% if selected and selected.content_type=='event' %}selected{% endif %}>Event</option></select></label><label class="field">Date<input name="event_date" type="date" required value="{{ selected.event_date if selected else '' }}"></label><label class="field span-2">Title<input name="title" required value="{{ selected.title if selected else '' }}"></label><label class="field">Slug<input name="slug" required value="{{ selected.slug if selected else '' }}"></label><label class="field">Date label<input name="date_label" value="{{ selected.date_label if selected else '' }}"></label><label class="field span-2">Content<textarea name="content" required rows="18">{{ selected.content if selected else '' }}</textarea></label><label class="field">Scheduled posting<input name="scheduled_posting_at" type="datetime-local" value="{{ selected.scheduled_posting_at.strftime('%Y-%m-%dT%H:%M') if selected and selected.scheduled_posting_at else '' }}" {% if selected and selected.status=='posted' %}readonly{% endif %}></label></div></form>{% endblock %}
