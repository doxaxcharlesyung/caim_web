<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page_title }} | CAIM Content Manager</title><link rel="stylesheet" href="{{ url_for('static',filename='css/site.css') }}"></head>
<body class="content-app"><header class="content-topbar"><a href="{{ url_for('content_admin.content_dashboard') }}"><strong>CAIM</strong> Content Manager</a>{% if g.admin_user %}<nav><a href="{{ url_for('content_admin.articles') }}">Articles</a><a href="{{ url_for('content_admin.courses') }}">Courses & Events</a><a href="{{ url_for('content_admin.news') }}">News & Events</a><a href="{{ url_for('content_admin.users') }}">Users</a><a href="{{ url_for('public.home') }}">View Website</a></nav><form method="post" action="{{ url_for('content_admin.logout') }}"><button class="btn btn-secondary">Logout</button></form>{% endif %}</header>
<main class="content-main">{% block content %}{% endblock %}</main>{% block scripts %}{% endblock %}</body></html>
