{% extends "layouts/base.html" %}{% block content %}<section class="admin-shell"><div class="container"><div class="dashboard-head"><div><span class="kicker">ACCESS CONTROL</span><h1>管理使用者</h1></div><a class="btn btn-secondary" href="{{ url_for('public.article_dashboard') }}">返回文章管理</a></div>{% if error %}<p class="studio-error">{{ error }}</p>{% endif %}<div class="user-grid"><form method="post" class="sacred-card admin-form"><h2>新增使用者</h2><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label>登入名稱<input name="username" minlength="3" required></label><label>初始密碼<input name="password" type="password" minlength="8" required></label><button class="btn btn-primary">新增</button></form><div class="sacred-card user-list"><h2>現有使用者</h2>{% for user in users %}<div class="user-row"><div><strong>{{ user.username }}</strong><small>{{ '啟用' if user.is_active else '停用' }}</small></div><form method="post" action="{{ url_for('public.article_dashboard_user_update',user_id=user.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button class="btn btn-secondary" name="action" value="toggle">{{ '停用' if user.is_active else '啟用' }}</button></form><form method="post" action="{{ url_for('public.article_dashboard_user_update',user_id=user.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input name="password" type="password" minlength="8" placeholder="新密碼" required><button class="btn btn-secondary" name="action" value="password">重設密碼</button></form></div>{% endfor %}</div></div></div></section>{% endblock %}
