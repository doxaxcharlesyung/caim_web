<!doctype html>
<html lang="{{ locale }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title or site.name }}</title>
    <meta name="description" content="{{ description or site.description }}">
    <meta name="keywords" content="{{ site.keywords }}">
    <meta property="og:title" content="{{ page_title or site.name }}">
    <meta property="og:description" content="{{ description or site.description }}">
    <meta property="og:type" content="website">
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/v3/global.css', v='compact-page-hero') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/v3/components.css', v='header-flush-top-hero-fixed') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/v3/overrides.css', v='hero-site-standard') }}">
    {% block page_styles %}{% endblock %}
    {% block head %}{% endblock %}
  </head>
  <body>
    {% include "components/header.html" %}
    <main>{% block content %}{% endblock %}</main>
    {% include "components/footer.html" %}
    <script src="{{ url_for('static', filename='js/site.js') }}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
