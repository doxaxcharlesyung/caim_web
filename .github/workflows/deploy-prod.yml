name: Deploy to PROD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: caim-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, prod]
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Apache vhost templates
        run: |
          test -f deploy/apache/caim.doxaxsolutions.com.conf
          test -f deploy/apache/caim.doxaxsolutions.com-le-ssl.conf

      - name: Install CAIM site files
        run: |
          sudo install -d /opt/test.doxaxsolutions.com/assets
          sudo install -m 0644 app.py /opt/test.doxaxsolutions.com/app.py
          sudo install -m 0644 home.html /opt/test.doxaxsolutions.com/home.html
          sudo install -m 0644 dx_sermon.html /opt/test.doxaxsolutions.com/dx_sermon.html
          sudo install -m 0644 ai_courses.html /opt/test.doxaxsolutions.com/ai_courses.html
          sudo install -m 0644 workshop.html /opt/test.doxaxsolutions.com/workshop.html
          sudo install -m 0644 how_to_help.html /opt/test.doxaxsolutions.com/how_to_help.html
          sudo install -m 0644 index.html /opt/test.doxaxsolutions.com/index.html
          sudo install -m 0644 site.css /opt/test.doxaxsolutions.com/site.css
          sudo cp -R assets/. /opt/test.doxaxsolutions.com/assets/

      - name: Install Apache vhost files
        run: |
          sudo install -m 0644 deploy/apache/caim.doxaxsolutions.com.conf /etc/httpd/conf.d/caim.doxaxsolutions.com.conf
          sudo install -m 0644 deploy/apache/caim.doxaxsolutions.com-le-ssl.conf /etc/httpd/conf.d/caim.doxaxsolutions.com-le-ssl.conf

      - name: Test Apache configuration
        run: sudo apachectl configtest

      - name: Restart CAIM app
        run: sudo systemctl restart doxax-testhtml.service

      - name: Reload Apache
        run: sudo systemctl reload httpd
