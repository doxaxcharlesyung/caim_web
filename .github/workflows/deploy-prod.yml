name: Deploy CAIM to PROD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: caim-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PROD
    permissions:
      contents: read

    env:
      PROD_SERVER: ${{ secrets.PROD_SERVER }}
      PROD_PORT: ${{ secrets.PROD_PORT }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_APP_DIR: /opt/caim_web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Flask application
        run: |
          test -f app/__init__.py
          test -f app/routes.py
          test -f templates/layouts/base.html
          test -f static/css/site.css
          test -f wsgi.py
          python3 -m compileall -q app app.py wsgi.py

      - name: Configure SSH authentication
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Trust production SSH host
        run: |
          test -n "$PROD_SERVER"
          test -n "$PROD_PORT"
          test -n "$PROD_USER"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_SERVER" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Verify production SSH access
        run: |
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" "printf 'SSH connection established\\n'"

      - name: Transfer application to production
        run: |
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
            "sudo rm -rf '$PROD_APP_DIR/app' '$PROD_APP_DIR/templates' '$PROD_APP_DIR/static' && sudo install -d -o '$PROD_USER' -g '$PROD_USER' '$PROD_APP_DIR'"

          tar -czf - app templates scripts app.py wsgi.py requirements.txt deploy \
            static/css static/js static/favicon.svg \
            static/assets/caim-dx-logo.png \
            static/assets/caim-hero-sacred-threshold.png \
            static/assets/caim-ministry.png \
            static/assets/caim-sacred-intelligence-concept.png \
            static/assets/dx-sermon-spirit.jpg \
            static/assets/dx-sermon-six-flow.png \
            static/assets/missionary-bible-bag.jpg \
            static/assets/reading-book.jpg \
            static/assets/articles-hero-bible.jpg \
            static/assets/contact-team.avif \
            static/assets/service-worship-transformation.jpg \
            static/assets/courses-hero-youth-learning.png \
            static/assets/courses-mt101-working-together.jpeg \
            static/assets/courses-mt102-joyful-learning.jpeg \
            static/assets/courses-mt103-learning-is-fun.jpeg \
            static/assets/courses-mt104-learning-gods-word.jpeg \
            static/assets/courses-mt105-studying-well.png \
            static/assets/courses-mt106-love-read-bible.jpeg \
            static/assets/courses-mt110-we-are-one.jpeg |
            ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
              "sudo install -d -o '$PROD_USER' -g '$PROD_USER' '$PROD_APP_DIR' && sudo tar -xzf - -C '$PROD_APP_DIR'"

          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
            "sudo chown -R '$PROD_USER':'$PROD_USER' '$PROD_APP_DIR/app' '$PROD_APP_DIR/templates' '$PROD_APP_DIR/static'"

      - name: Configure production application secret
        env:
          PROD_SECRET_KEY: ${{ secrets.PROD_SECRET_KEY }}
        run: |
          test -n "$PROD_SECRET_KEY"
          printf 'SECRET_KEY=%s\nAPP_ENV=production\n' "$PROD_SECRET_KEY" |
            ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
              "sudo install -o '$PROD_USER' -g '$PROD_USER' -m 0600 /dev/stdin '$PROD_APP_DIR/.env'"

      - name: Configure CRM integration
        env:
          PROD_CRM_CONSULTATION_TOKEN: ${{ secrets.PROD_CRM_CONSULTATION_TOKEN }}
        run: |
          printf 'CRM_API_URL=https://dxcrm.doxaxsolutions.com/api/v1/public/consultation-intake\nCRM_CONSULTATION_TOKEN=%s\n' "$PROD_CRM_CONSULTATION_TOKEN" |
            ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
              "sudo tee -a '$PROD_APP_DIR/.env' >/dev/null && sudo chown '$PROD_USER':'$PROD_USER' '$PROD_APP_DIR/.env' && sudo chmod 0600 '$PROD_APP_DIR/.env'"

      - name: Configure MySQL content database
        env:
          PROD_CAIM_DB_HOST: ${{ secrets.PROD_CAIM_DB_HOST }}
          PROD_CAIM_DB_PASSWORD: ${{ secrets.PROD_CAIM_DB_PASSWORD }}
        run: |
          test -n "$PROD_CAIM_DB_HOST"
          test -n "$PROD_CAIM_DB_PASSWORD"
          printf 'DB_HOST=%s\nDB_PORT=3306\nDB_USER=caimadmin\nDB_PASSWORD=%s\nDB_NAME=caimdb\n' "$PROD_CAIM_DB_HOST" "$PROD_CAIM_DB_PASSWORD" |
            ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
              "sudo tee -a '$PROD_APP_DIR/.env' >/dev/null && sudo chown '$PROD_USER':'$PROD_USER' '$PROD_APP_DIR/.env' && sudo chmod 0600 '$PROD_APP_DIR/.env'"

      - name: Prepare production virtual environment
        run: |
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
            "if [ ! -x '$PROD_APP_DIR/.venv/bin/python' ]; then python3.12 -m venv '$PROD_APP_DIR/.venv'; fi && '$PROD_APP_DIR/.venv/bin/python' -m pip install --upgrade pip && '$PROD_APP_DIR/.venv/bin/pip' install --requirement '$PROD_APP_DIR/requirements.txt'"

      - name: Create or bootstrap production database
        env:
          PROD_CAIM_DB_HOST: ${{ secrets.PROD_CAIM_DB_HOST }}
          PROD_MYSQL_ADMIN_PASSWORD: ${{ secrets.PROD_MYSQL_ADMIN_PASSWORD }}
          PROD_MYSQL_ADMIN_SOCKET: ${{ secrets.PROD_MYSQL_ADMIN_SOCKET }}
        run: |
          test -n "$PROD_MYSQL_ADMIN_PASSWORD"
          {
            printf 'MYSQL_ADMIN_USER=root\nMYSQL_ADMIN_PASSWORD=%s\n' "$PROD_MYSQL_ADMIN_PASSWORD"
            if [ -n "$PROD_MYSQL_ADMIN_SOCKET" ]; then
              printf 'MYSQL_ADMIN_SOCKET=%s\n' "$PROD_MYSQL_ADMIN_SOCKET"
            else
              printf 'MYSQL_ADMIN_HOST=%s\n' "$PROD_CAIM_DB_HOST"
            fi
          } |
            ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
              "sudo install -o '$PROD_USER' -g '$PROD_USER' -m 0600 /dev/stdin '$PROD_APP_DIR/.db-bootstrap.env'"
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
            "cd '$PROD_APP_DIR' && set -a && . '$PROD_APP_DIR/.env' && . '$PROD_APP_DIR/.db-bootstrap.env' && set +a && '$PROD_APP_DIR/.venv/bin/python' scripts/create_prod_database.py; status=\$?; rm -f '$PROD_APP_DIR/.db-bootstrap.env'; exit \$status"

      - name: Migrate article dashboard database
        run: |
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
            "cd '$PROD_APP_DIR' && '$PROD_APP_DIR/.venv/bin/python' scripts/migrate_article_dashboard.py"

      - name: Import committed local content snapshot
        run: |
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
            "cd '$PROD_APP_DIR' && '$PROD_APP_DIR/.venv/bin/python' scripts/import_content_snapshot.py scripts/content_snapshot.json"

      - name: Install and restart CAIM service
        run: |
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
            "sudo install -m 0644 '$PROD_APP_DIR/deploy/systemd/doxax-caim-web.service' /etc/systemd/system/doxax-caim-web.service && sudo install -m 0644 '$PROD_APP_DIR/deploy/apache/caim.doxaxsolutions.com.conf' /etc/httpd/conf.d/caim.doxaxsolutions.com.conf && sudo install -m 0644 '$PROD_APP_DIR/deploy/apache/caim.doxaxsolutions.com-le-ssl.conf' /etc/httpd/conf.d/caim.doxaxsolutions.com-le-ssl.conf && sudo apachectl configtest && sudo systemctl daemon-reload && sudo systemctl enable doxax-caim-web.service && sudo systemctl restart doxax-caim-web.service && sudo systemctl is-active --quiet doxax-caim-web.service"

      - name: Reload Apache and run health checks
        run: |
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_SERVER" \
            "sudo systemctl reload httpd && curl --fail --silent --show-error http://127.0.0.1:18003/ >/dev/null"
          curl --fail --silent --show-error --head "https://$PROD_SERVER/"
