<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName caim.doxaxsolutions.com
    ServerAdmin charles.yung@doxaxsolutions.com

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:18001/
    ProxyPassReverse / http://127.0.0.1:18001/

    ErrorLog /var/log/httpd/caim_error.log
    CustomLog /var/log/httpd/caim_access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/caim.doxaxsolutions.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/caim.doxaxsolutions.com/privkey.pem
</VirtualHost>
</IfModule>
