<VirtualHost *:80>
    ServerName caim.doxaxsolutions.com
    ServerAdmin charles.yung@doxaxsolutions.com

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    RewriteEngine On
    RewriteRule ^/$ http://127.0.0.1:18000/caim-2/ [P,L]

    ProxyPass / http://127.0.0.1:18000/
    ProxyPassReverse / http://127.0.0.1:18000/

    ErrorLog /var/log/httpd/caim_error.log
    CustomLog /var/log/httpd/caim_access.log combined

    RewriteCond %{REQUEST_URI} !=/
    RewriteCond %{SERVER_NAME} =caim.doxaxsolutions.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
